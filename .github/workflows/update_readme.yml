name: Update README with Recently Read Papers

on:
  push:
    paths:
      - 'papers.yml'
  schedule:
    - cron: '59 6 * * 0' # 11:59 PM PST Sunday (6:59 AM UTC Monday)
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml pytz

      - name: Update README
        run: python .github/scripts/update_readme.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update recent papers in README"
          git push
